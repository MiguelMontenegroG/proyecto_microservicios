# Perfil Service - Reto 3
# Servicio consumidor de eventos y API REST para gestion de perfiles

spring.application.name=perfiles-service
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/}
spring.data.mongodb.database=db-perfiles
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.listener.simple.acknowledge-mode=auto
server.port=${PERFILES_SERVICE_PORT:8083}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
logging.level.com.microservicios.perfiles_service=DEBUG
logging.level.org.springframework.amqp=DEBUG

# OpenTelemetry (Reto 7 - Trazabilidad Distribuida)
# Nota: Pendiente de configurar con dependencias OTel

# Configuracion de OpenAPI/Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Configuracion de JWT (compartida con auth-service)
jwt.secret=${JWT_SECRET:mi_clave_secreta_muy_larga_para_jwt_con_mas_de_32_caracteres_123456}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}
