# Notificaciones Service
# Servicio consumidor de eventos para gestiÃ³n de notificaciones

spring.application.name=notificaciones-service
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/}
spring.data.mongodb.database=db-notificaciones
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.listener.simple.acknowledge-mode=auto
server.port=${NOTIFICACIONES_SERVICE_PORT:8084}
management.endpoints.web.exposure.include=health,info
logging.level.com.microservicios.notificaciones_service=DEBUG
logging.level.org.springframework.amqp=DEBUG
