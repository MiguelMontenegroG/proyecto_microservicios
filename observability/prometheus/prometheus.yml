global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Nota: Las rutas de métricas varían según el lenguaje del servicio.
  # Spring Boot expone métricas en /actuator/prometheus (con micrometer-registry-prometheus)
  # Python/Flask expone en /metrics (con prometheus-flask-exporter)

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8085']

  - job_name: 'empleados-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['empleados-service:8080']

  - job_name: 'departamentos-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['departamentos-service:8081']

  - job_name: 'perfiles-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['perfiles-service:8083']

  - job_name: 'notificaciones-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notificaciones-service:8084']

  - job_name: 'python-healthcheck-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['python-healthcheck-service:8086']
