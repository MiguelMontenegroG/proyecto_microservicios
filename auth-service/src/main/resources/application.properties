spring.application.name=auth-service
server.port=${AUTH_SERVICE_PORT:8085}

# Conexion a MongoDB - configurable via variables de entorno
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/}
spring.data.mongodb.database=${MONGODB_DATABASE_AUTH:authdb}

# Perfiles de Spring
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.microservicios.auth_service=${LOGGING_LEVEL_AUTH:DEBUG}
logging.level.com.microservicios.auth_service.controller=${LOGGING_LEVEL_AUTH:DEBUG}
logging.level.com.microservicios.auth_service.service=${LOGGING_LEVEL_AUTH:DEBUG}
logging.level.org.springframework.data.mongodb=${LOGGING_LEVEL_MONGODB:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Configuracion de OpenAPI/Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Configuracion de Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Configuracion de JWT
jwt.secret=${JWT_SECRET:mi_clave_secreta_muy_larga_para_jwt_con_mas_de_32_caracteres}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}

# Configuracion de RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin}
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# URL del servicio de empleados
empleados.service.url=${EMPLEADOS_SERVICE_URL:http://localhost:8080}

# Informacion de la aplicacion
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
