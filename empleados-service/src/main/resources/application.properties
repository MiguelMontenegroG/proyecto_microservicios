spring.application.name=empleados-service
server.port=${EMPLEADOS_SERVICE_PORT:8080}

# Conexion a MongoDB - configurable via variables de entorno
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/}
spring.data.mongodb.database=${MONGODB_DATABASE_EMPLEADOS:empleadosdb}

# Perfiles de Spring
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Logging - configurable via variables de entorno
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.microservicios.empleados_service=${LOGGING_LEVEL_EMPLEADOS:INFO}
logging.level.com.microservicios.empleados_service.controller=${LOGGING_LEVEL_EMPLEADOS:DEBUG}
logging.level.com.microservicios.empleados_service.service=${LOGGING_LEVEL_EMPLEADOS:DEBUG}
logging.level.org.springframework.data.mongodb=${LOGGING_LEVEL_MONGODB:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Configuracion de OpenAPI/Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Configuracion de Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true

# URL del servicio de departamentos para validaciÃÂÃÂ³n
departamento.service.url=${DEPARTAMENTOS_SERVICE_URL:http://departamentos-service:8081}

# Informacion de la aplicacion
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@

# Configuracion de Resilience4j - configurable via variables de entorno
resilience4j.circuitbreaker.instances.departamento.failure-rate-threshold=${CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
resilience4j.circuitbreaker.instances.departamento.wait-duration-in-open-state=${CIRCUIT_BREAKER_WAIT_DURATION:30000}
resilience4j.circuitbreaker.instances.departamento.permitted-number-of-calls-in-half-open-state=${CIRCUIT_BREAKER_PERMITTED_CALLS:10}
resilience4j.circuitbreaker.instances.departamento.sliding-window-size=${CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:100}
resilience4j.circuitbreaker.instances.departamento.minimum-number-of-calls=${CIRCUIT_BREAKER_MINIMUM_CALLS:5}

# Configuracion de RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin}
spring.rabbitmq.listener.simple.acknowledge-mode=auto